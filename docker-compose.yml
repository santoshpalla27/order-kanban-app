services:
  traefik:
    image: traefik:latest
    container_name: kanban-traefik
    restart: unless-stopped
    command:
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --log.level=INFO
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt-data:/letsencrypt
    networks:
      - kanban-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.http-catchall.rule=HostRegexp(`.+`)
      - traefik.http.routers.http-catchall.entrypoints=web
      - traefik.http.routers.http-catchall.middlewares=redirect-to-https
      - traefik.http.routers.http-catchall.priority=1
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true

  postgres:
    image: postgres:16-alpine
    container_name: kanban-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-kanban}
      - POSTGRES_USER=${POSTGRES_USER:-kanban}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kanban-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-kanban} -d ${POSTGRES_DB:-kanban}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kanban-backend
    restart: unless-stopped
    environment:
      - PORT=8080
      - LOG_FORMAT=json
      - DATABASE_URL=postgres://${POSTGRES_USER:-kanban}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kanban}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=https://app.santoshdevops.cloud
      - R2_BUCKET=${R2_BUCKET}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY=${R2_ACCESS_KEY}
      - R2_SECRET_KEY=${R2_SECRET_KEY}
      - R2_ENDPOINT=${R2_ENDPOINT}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kanban-net

    labels:
      - traefik.enable=false

  push-service:
    build:
      context: ./push-service
      dockerfile: Dockerfile
    container_name: kanban-push-service
    restart: unless-stopped
    environment:
      - PORT=4001
      - DATABASE_URL=postgres://${POSTGRES_USER:-kanban}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kanban}?sslmode=disable
      - EXPO_ACCESS_TOKEN=${EXPO_ACCESS_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kanban-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.push.rule=Host(`app.santoshdevops.cloud`) && PathPrefix(`/push-api`)
      - traefik.http.routers.push.entrypoints=websecure
      - traefik.http.routers.push.tls.certresolver=letsencrypt
      - traefik.http.middlewares.push-strip.stripprefix.prefixes=/push-api
      - traefik.http.routers.push.middlewares=push-strip
      - traefik.http.services.push.loadbalancer.server.port=4001

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://app.santoshdevops.cloud/api
    container_name: kanban-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - kanban-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=Host(`app.santoshdevops.cloud`)
      - traefik.http.routers.frontend.entrypoints=websecure
      - traefik.http.routers.frontend.tls.certresolver=letsencrypt
      - traefik.http.services.frontend.loadbalancer.server.port=80

  # ── Monitor — server & Docker dashboard (m.santoshdevops.cloud) ─────────────
  monitor:
    build:
      context: ./monitor
      dockerfile: Dockerfile
    container_name: kanban-monitor
    restart: unless-stopped
    environment:
      - PORT=9090
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - kanban-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.monitor.rule=Host(`m.santoshdevops.cloud`)
      - traefik.http.routers.monitor.entrypoints=websecure
      - traefik.http.routers.monitor.tls.certresolver=letsencrypt
      - traefik.http.services.monitor.loadbalancer.server.port=9090
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.10"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres_data:
  letsencrypt-data:

networks:
  kanban-net:
    driver: bridge
