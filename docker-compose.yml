services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kanban-backend
    restart: unless-stopped
    environment:
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-secure-secret-key}
      - DB_PATH=/app/data/kanban.db
      - UPLOAD_DIR=/app/uploads
    volumes:
      - sqlite-data:/app/data
      - uploads-data:/app/uploads
    networks:
      - kanban-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kanban-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - kanban-net

volumes:
  sqlite-data:
  uploads-data:

networks:
  kanban-net:
    driver: bridge
