# Test compose — no Traefik, services exposed directly on host ports.
# Use this to verify the stack on the server before switching to prod.
#
#   docker compose -f docker-compose-test.yml up -d
#
# Access:
#   Frontend:     http://<server-ip>:3000
#   Backend API:  http://<server-ip>:8080
#   Push service: http://<server-ip>:4001

services:
  postgres:
    image: postgres:16-alpine
    container_name: kanban-postgres
    restart: unless-stopped
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - effective_cache_size=256MB
      - -c
      - work_mem=2MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - max_connections=50
      - -c
      - wal_buffers=8MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - random_page_cost=1.1
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-kanban}
      - POSTGRES_USER=${POSTGRES_USER:-kanban}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - kanban-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-kanban} -d ${POSTGRES_DB:-kanban}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.75"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: santoshpalla27/gift-highway:backend
    container_name: kanban-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - LOG_FORMAT=json
      - DATABASE_URL=postgres://${POSTGRES_USER:-kanban}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kanban}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - R2_BUCKET=${R2_BUCKET}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY=${R2_ACCESS_KEY}
      - R2_SECRET_KEY=${R2_SECRET_KEY}
      - R2_ENDPOINT=${R2_ENDPOINT}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kanban-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.50"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  push-service:
    image: santoshpalla27/gift-highway:push-service
    container_name: kanban-push-service
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - DATABASE_URL=postgres://${POSTGRES_USER:-kanban}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kanban}?sslmode=disable
      - EXPO_ACCESS_TOKEN=${EXPO_ACCESS_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kanban-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: santoshpalla27/gift-highway:frontend
    container_name: kanban-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - kanban-net
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  postgres-data:

networks:
  kanban-net:
    driver: bridge
