# Production compose — uses pre-built images (no build step).
# Before deploying:
#   1. Build and push images to your registry:
#        docker build -t your-registry/kanban-backend:latest ./backend
#        docker build --build-arg VITE_API_URL=https://your-domain.com/api \
#                     -t your-registry/kanban-frontend:latest ./frontend
#        docker push your-registry/kanban-backend:latest
#        docker push your-registry/kanban-frontend:latest
#   2. Copy .env.example → .env and fill in all values.
#   3. Run: docker compose -f docker-compose.prod.yml up -d

# ── Memory budget for 2 GB server ────────────────────────────────────────────
#   OS + kernel:  ~512 MB
#   Traefik:        64 MB
#   PostgreSQL:    512 MB
#   Backend:       128 MB
#   Push-service:   64 MB
#   Frontend:       32 MB
#   Glances:       100 MB
#   Dozzle:         30 MB
#   Buffer/cache:  ~560 MB
# ─────────────────────────────────────────────────────────────────────────────

services:
  traefik:
    image: traefik:v3.6.10
    container_name: kanban-traefik
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.41
    command:
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.endpoint=unix:///var/run/docker.sock
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --log.level=DEBUG
      - --accesslog=false
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt-data:/letsencrypt
    networks:
      - kanban-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.http-catchall.rule=HostRegexp(`.+`)
      - traefik.http.routers.http-catchall.entrypoints=web
      - traefik.http.routers.http-catchall.middlewares=redirect-to-https
      - traefik.http.routers.http-catchall.priority=1
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    container_name: kanban-postgres
    restart: unless-stopped
    # Tuned for 512 MB container on a 2 GB host
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - effective_cache_size=256MB
      - -c
      - work_mem=2MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - max_connections=50
      - -c
      - wal_buffers=8MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - random_page_cost=1.1
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-kanban}
      - POSTGRES_USER=${POSTGRES_USER:-kanban}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - kanban-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-kanban} -d ${POSTGRES_DB:-kanban}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.75"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: santoshpalla27/gift-highway:backend
    container_name: kanban-backend
    restart: unless-stopped
    environment:
      - PORT=8080
      - LOG_FORMAT=json
      - DATABASE_URL=postgres://${POSTGRES_USER:-kanban}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kanban}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - R2_BUCKET=${R2_BUCKET}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY=${R2_ACCESS_KEY}
      - R2_SECRET_KEY=${R2_SECRET_KEY}
      - R2_ENDPOINT=${R2_ENDPOINT}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kanban-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.backend.entrypoints=websecure
      - traefik.http.routers.backend.tls.certresolver=letsencrypt
      - traefik.http.services.backend.loadbalancer.server.port=8080
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.50"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  push-service:
    image: santoshpalla27/gift-highway:push-service
    container_name: kanban-push-service
    restart: unless-stopped
    environment:
      - PORT=4001
      - DATABASE_URL=postgres://${POSTGRES_USER:-kanban}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kanban}?sslmode=disable
      - EXPO_ACCESS_TOKEN=${EXPO_ACCESS_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kanban-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.push.rule=Host(`${DOMAIN}`) && PathPrefix(`/push-api`)
      - traefik.http.routers.push.entrypoints=websecure
      - traefik.http.routers.push.tls.certresolver=letsencrypt
      - traefik.http.middlewares.push-strip.stripprefix.prefixes=/push-api
      - traefik.http.routers.push.middlewares=push-strip
      - traefik.http.services.push.loadbalancer.server.port=4001
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: santoshpalla27/gift-highway:frontend
    container_name: kanban-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - kanban-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.frontend.entrypoints=websecure
      - traefik.http.routers.frontend.tls.certresolver=letsencrypt
      - traefik.http.routers.frontend.priority=1
      - traefik.http.services.frontend.loadbalancer.server.port=80
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── Glances — system metrics dashboard (g.santoshdevops.cloud) ──────────────
  glances:
    image: nicolargo/glances:stable-full
    container_name: kanban-glances
    restart: unless-stopped
    pid: host
    environment:
      - GLANCES_OPT=-w
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/os-release:/etc/os-release:ro
    networks:
      - kanban-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.glances.rule=Host(`g.santoshdevops.cloud`)
      - traefik.http.routers.glances.entrypoints=websecure
      - traefik.http.routers.glances.tls.certresolver=letsencrypt
      - traefik.http.routers.glances.middlewares=glances-auth
      - traefik.http.services.glances.loadbalancer.server.port=61208
      - traefik.http.middlewares.glances-auth.basicauth.users=${ADMIN_AUTH}
    deploy:
      resources:
        limits:
          memory: 100M
          cpus: "0.15"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Dozzle — container log viewer (d.santoshdevops.cloud) ────────────────────
  dozzle:
    image: amir20/dozzle:latest
    container_name: kanban-dozzle
    restart: unless-stopped
    environment:
      - DOZZLE_NO_ANALYTICS=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - kanban-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.dozzle.rule=Host(`d.santoshdevops.cloud`)
      - traefik.http.routers.dozzle.entrypoints=websecure
      - traefik.http.routers.dozzle.tls.certresolver=letsencrypt
      - traefik.http.routers.dozzle.middlewares=dozzle-auth
      - traefik.http.services.dozzle.loadbalancer.server.port=8080
      - traefik.http.middlewares.dozzle-auth.basicauth.users=${ADMIN_AUTH}
    deploy:
      resources:
        limits:
          memory: 30M
          cpus: "0.10"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres-data:
  letsencrypt-data:

networks:
  kanban-net:
    driver: bridge
