# Netdata configuration — tuned for low-resource servers (2 GB RAM)
# Docs: https://learn.netdata.cloud/docs/netdata-agent/configuration

[global]
    # Update metrics every 2 seconds instead of 1 — halves CPU usage
    update every = 2

    # Run at a lower OS priority so it never starves your app
    process scheduling policy = idle
    process scheduling priority = 19

    # Bind only to localhost — Traefik handles external access
    bind to = 0.0.0.0

[db]
    # dbengine: persistent, compressed on disk — best for low RAM
    mode = dbengine

    # Keep 1 day of high-res data, then discard
    # (reduces /var/lib/netdata disk usage)
    retention = 1

    # Tier 0 page cache: 32 MB RAM for hot metrics
    dbengine page cache size = 32

[ml]
    # Disable anomaly detection — saves ~20 MB RAM and significant CPU
    enabled = no

[plugins]
    # Disable plugins not useful in a Docker container environment
    fping       = no    # ICMP ping monitoring — not needed
    ioping      = no    # Disk I/O latency — optional, disable to save CPU
    nfacct      = no    # netfilter accounting — not needed
    xenstat     = no    # Xen hypervisor — not applicable
    perf        = no    # Linux perf events — high overhead
    slabinfo    = no    # kernel slab cache — not needed

    # Keep these enabled — they cover the important stuff
    proc        = yes   # CPU, memory, network, disk from /proc
    cgroups     = yes   # Docker container metrics
    diskspace   = yes   # Disk usage per mount
    apps        = no    # Per-process breakdown — disable: high overhead on small servers

[health]
    # Keep alerting on but reduce log noise
    enabled = yes
    run at least every = 10s

[logs]
    # Reduce log verbosity
    debug log    = none
    error log    = /var/log/netdata/error.log
    access log   = none
    facility     = daemon
